name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  tests:
    name: Ubuntu / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv with Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.13"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install MPI
        run: sudo apt-get update && sudo apt-get install -y openmpi-bin libopenmpi-dev

      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups

      - name: Execute the tests
        run: uv run pytest -n auto -vv .
